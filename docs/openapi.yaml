openapi: 3.0.1
info:
  title: BLPS - Job Vacancy Management API
  description: |-
    REST API for job vacancy management system (hh.ru-like) with moderation workflow.

    ## Features
    - User registration and HTTP Basic authentication
    - Vacancy management (CRUD operations)
    - Tariff selection and vacancy publishing (BPMN workflow)
    - Vacancy moderation system
    - Tariff usage statistics and history
    - Role-based access control (EMPLOYER, MODERATOR, ADMIN)

    ## User Roles

    ### EMPLOYER
    - Create, edit, and delete own vacancies
    - Select tariff for vacancies
    - Submit vacancies for moderation
    - View own vacancy statistics
    - Update own profile

    ### MODERATOR
    - View all pending vacancies
    - Approve or reject vacancies with reason
    - View tariff usage statistics
    - View moderation history
    - Update own profile

    ### ADMIN
    - All EMPLOYER and MODERATOR permissions
    - Manage users (view, update, delete)
    - Manage tariffs (create, update, delete)
    - Full access to all system resources

    ## Workflow (BPMN)
    1. Employer creates vacancy (DRAFT status)
    2. Employer selects tariff
    3. Employer submits for publication (PENDING_MODERATION status)
    4. Moderator reviews vacancy
    5. Moderator approves (PUBLISHED) or rejects (REJECTED) with reason
    6. If approved: vacancy published + tariff usage recorded in history
    7. Employer can archive published vacancy (ARCHIVED status)
  contact:
    name: BLPS Project
    email: support@blps.example.com
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT
  version: 1.0.0
servers:
- url: http://localhost:8080/blps
  description: Generated server url
security:
- basicAuth: []
tags:
- name: Tariff Statistics
  description: Tariff usage statistics and history endpoints
- name: Authentication
  description: Registration and HTTP Basic auth
- name: Users
  description: User profile and admin endpoints
- name: Moderation
  description: Vacancy moderation endpoints (moderator and admin)
- name: Vacancies
  description: Vacancy management endpoints
- name: Tariffs
  description: Tariff management endpoints
paths:
  /api/v1/tariffs/{id}:
    get:
      tags:
      - Tariffs
      summary: "[PUBLIC] Get tariff by ID"
      description: Get tariff details by ID (public)
      operationId: getTariffById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Tariff found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TariffResponse"
        "404":
          description: Tariff not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
      - Tariffs
      summary: "[ADMIN] Update tariff"
      description: Update existing tariff (admin only)
      operationId: updateTariff
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTariffRequest"
        required: true
      responses:
        "400":
          description: Validation error - invalid request data
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tariff not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - admin role required
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Tariff updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TariffResponse"
        "401":
          description: Unauthorized - missing or invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
    delete:
      tags:
      - Tariffs
      summary: "[ADMIN] Delete tariff"
      description: Delete tariff by ID (admin only)
      operationId: deleteTariff
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "404":
          description: Tariff not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - admin role required
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "204":
          description: Tariff deleted successfully
      security:
      - basicAuth: []
  /api/v1/vacancies:
    get:
      tags:
      - Vacancies
      summary: "[PUBLIC/EMPLOYER/MODERATOR/ADMIN] Get vacancies"
      description: Get paginated list of vacancies. Use my=true to get only your vacancies
        (requires auth)
      operationId: getAllVacancies
      parameters:
      - name: status
        in: query
        required: false
        schema:
          type: string
          enum:
          - DRAFT
          - PENDING_MODERATION
          - REJECTED
          - PUBLISHED
          - ARCHIVED
          - CLOSED
      - name: my
        in: query
        required: false
        schema:
          type: boolean
          default: false
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "401":
          description: Unauthorized - missing or invalid token (when my=true)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Vacancies retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseVacancyResponse"
    post:
      tags:
      - Vacancies
      summary: "[EMPLOYER, ADMIN] Create vacancy"
      description: Create a new vacancy draft
      operationId: createVacancy
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVacancyRequest"
        required: true
      responses:
        "400":
          description: Validation error - invalid request data
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "201":
          description: Vacancy created successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/VacancyResponse"
        "401":
          description: Unauthorized - missing or invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
  /api/v1/tariffs:
    get:
      tags:
      - Tariffs
      summary: "[PUBLIC] Get all tariffs"
      description: Get paginated list of all tariffs (public)
      operationId: getAllTariffs
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: Tariffs retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseTariffResponse"
    post:
      tags:
      - Tariffs
      summary: "[ADMIN] Create tariff"
      description: Create a new tariff (admin only)
      operationId: createTariff
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTariffRequest"
        required: true
      responses:
        "400":
          description: Validation error - invalid request data
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - admin role required
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "201":
          description: Tariff created successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TariffResponse"
      security:
      - basicAuth: []
  /api/v1/moderation/{vacancyId}/moderate:
    post:
      tags:
      - Moderation
      summary: "[MODERATOR, ADMIN] Moderate vacancy"
      description: "Approve or reject vacancy (moderator and admin). Use action=APPROVE\
        \ to approve and publish, action=REJECT to reject with reason."
      operationId: moderateVacancy
      parameters:
      - name: vacancyId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: action
        in: query
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectVacancyRequest"
      responses:
        "200":
          description: Vacancy moderated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/VacancyResponse"
        "400":
          description: "Validation error - vacancy must be in PENDING_MODERATION status,\
            \ reason required for REJECT action"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - moderator role required
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vacancy not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid credentials
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      summary: "[PUBLIC] Register new user"
      description: "Create a new user (role EMPLOYER). Auth: HTTP Basic with email\
        \ and password."
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "201":
          description: User registered successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: "Validation error - invalid email, password, or user already\
            \ exists"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/vacancies/{id}:
    get:
      tags:
      - Vacancies
      summary: "[PUBLIC] Get vacancy by ID"
      description: Get vacancy details by ID (public)
      operationId: getVacancyById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "404":
          description: Vacancy not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Vacancy found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/VacancyResponse"
    delete:
      tags:
      - Vacancies
      summary: "[OWNER, ADMIN] Delete vacancy"
      description: Delete vacancy (owner or admin)
      operationId: deleteVacancy
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "401":
          description: Unauthorized - missing or invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - you don't have permission to delete this vacancy
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "204":
          description: Vacancy deleted successfully
        "404":
          description: Vacancy not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
    patch:
      tags:
      - Vacancies
      summary: "[OWNER, ADMIN] Update vacancy"
      description: Partially update existing vacancy (owner or admin)
      operationId: updateVacancy
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVacancyRequest"
        required: true
      responses:
        "400":
          description: Validation error - invalid request data
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - you don't have permission to update this vacancy
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Vacancy updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/VacancyResponse"
        "404":
          description: Vacancy not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
  /api/v1/vacancies/{id}/tariff:
    patch:
      tags:
      - Vacancies
      summary: "[OWNER, ADMIN] Select tariff"
      description: "Select tariff for vacancy (BPMN: Draft -> Payment)"
      operationId: selectTariff
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: tariffId
        in: query
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "400":
          description: Validation error - invalid tariff or vacancy state
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - you don't have permission to modify this vacancy
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Tariff selected successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/VacancyResponse"
        "401":
          description: Unauthorized - missing or invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vacancy or tariff not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
  /api/v1/vacancies/{id}/publish:
    patch:
      tags:
      - Vacancies
      summary: "[OWNER, ADMIN] Submit for moderation"
      description: "Submit vacancy for moderation (BPMN: Draft -> Pending Moderation)"
      operationId: publishVacancy
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "403":
          description: Forbidden - you don't have permission to publish this vacancy
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vacancy not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Vacancy published successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/VacancyResponse"
        "400":
          description: Validation error - vacancy must have a tariff selected
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
  /api/v1/vacancies/{id}/archive:
    patch:
      tags:
      - Vacancies
      summary: "[OWNER, ADMIN] Archive vacancy"
      description: "Archive vacancy (BPMN: Published -> Archived)"
      operationId: archiveVacancy
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "400":
          description: Validation error - vacancy must be published to archive
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Vacancy archived successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/VacancyResponse"
        "404":
          description: Vacancy not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - you don't have permission to archive this vacancy
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
  /api/v1/users/{id}:
    get:
      tags:
      - Users
      summary: "[PUBLIC] Get user by ID"
      description: Get user profile by ID (public)
      operationId: getUserById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: User found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: User not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags:
      - Users
      summary: "[OWNER, ADMIN] Update user"
      description: Employer/Moderator can update only their own profile (except role).
        Admin can update any user and change role.
      operationId: updateUser
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
        required: true
      responses:
        "400":
          description: Validation error - invalid request data or email already exists
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: User updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
        "403":
          description: Forbidden - employer cannot update another user or change role
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
  /api/v1/users:
    get:
      tags:
      - Users
      summary: "[EMPLOYER/MODERATOR/ADMIN] Get users"
      description: Get paginated list of all users (admin only when my=false) or current
        user (when my=true)
      operationId: getAllUsers
      parameters:
      - name: my
        in: query
        required: false
        schema:
          type: boolean
          default: false
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: Users retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseUserResponse"
        "401":
          description: Unauthorized - missing or invalid credentials
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
  /api/v1/users/me:
    get:
      tags:
      - Users
      summary: "[EMPLOYER/MODERATOR/ADMIN] Get current user"
      description: Get current authenticated user profile
      operationId: getCurrentUser
      responses:
        "200":
          description: Current user retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: User not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid credentials
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
  /api/v1/tariffs/{id}/statistics:
    get:
      tags:
      - Tariff Statistics
      summary: "[ADMIN, MODERATOR] Get tariff statistics"
      description: Get aggregated statistics for a tariff (admin/moderator only)
      operationId: getTariffStatistics
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "404":
          description: Tariff not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Statistics retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TariffStatisticsResponse"
        "403":
          description: Forbidden - admin or moderator role required
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid credentials
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
  /api/v1/tariffs/{id}/history:
    get:
      tags:
      - Tariff Statistics
      summary: "[ADMIN, MODERATOR] Get tariff usage history"
      description: Get detailed usage history for a tariff (admin/moderator only)
      operationId: getTariffUsageHistory
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "404":
          description: Tariff not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: Usage history retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseTariffUsageHistoryResponse"
        "403":
          description: Forbidden - admin or moderator role required
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid credentials
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
  /api/v1/moderation/pending:
    get:
      tags:
      - Moderation
      summary: "[MODERATOR, ADMIN] Get pending vacancies"
      description: Get paginated list of vacancies awaiting moderation (moderator
        and admin)
      operationId: getPendingVacancies
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: Pending vacancies retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PagedResponseVacancyResponse"
        "403":
          description: Forbidden - moderator role required
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid credentials
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      security:
      - basicAuth: []
  /api/v1/users/{userId}:
    delete:
      tags:
      - Users
      summary: "[ADMIN] Delete user"
      description: "Delete user and all their vacancies (admin only, cascaded deletion).\
        \ Cannot delete yourself."
      operationId: deleteUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "400":
          description: Validation error - cannot delete yourself
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - admin role required
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - missing or invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "204":
          description: User deleted successfully
      security:
      - basicAuth: []
components:
  schemas:
    UpdateTariffRequest:
      type: object
      properties:
        name:
          maxLength: 100
          minLength: 0
