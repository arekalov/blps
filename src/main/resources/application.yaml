spring:
  application:
    name: blps
  
  # Профиль по умолчанию для локальной разработки
  profiles:
    active: dev
  
  # Включаем выброс исключения для несуществующих эндпоинтов
  web:
    resources:
      add-mappings: false
  mvc:
    throw-exception-if-no-handler-found: true
  
  # Общие настройки JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  
  # Flyway настройки
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

# Настройки сервера
server:
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always

# OpenAPI настройки (общие)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  writer-with-default-pretty-printer: true
  paths-to-match: /api/v1/**

# Настройки логирования (общие)
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"


blps:
  bootstrap:
    admin-email: admin@ya.ru
    admin-password: admin
    admin-company-name: Admin Company
